name: Publish @tantuui/react to npm

on:
  push:
    tags:
      - "react-v*" # e.g. react-v0.0.1-beta
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0, 0.1.0-beta.1, 0.1.0-dev.1)"
        required: true
        type: string
      dist_tag:
        description: "npm dist-tag"
        required: true
        type: choice
        options:
          - latest
          - dev
          - beta
        default: latest

jobs:
  publish:
    name: Build & Publish @tantuui/react
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build tokens (dependency)
        run: npm run build --workspace=packages/tokens

      - name: Build react
        run: npm run build --workspace=packages/react

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG_VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "TAG_VERSION=${GITHUB_REF#refs/tags/react-v}" >> $GITHUB_OUTPUT
          fi

      - name: Set package version
        working-directory: packages/react
        run: npm version ${{ steps.version.outputs.TAG_VERSION }} --no-git-tag-version --allow-same-version

      - name: Determine dist-tag
        id: dist_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ inputs.dist_tag }}" >> $GITHUB_OUTPUT
          else
            VERSION="${{ steps.version.outputs.TAG_VERSION }}"
            if [[ "$VERSION" == *"-dev"* ]]; then
              echo "TAG=dev" >> $GITHUB_OUTPUT
            elif [[ "$VERSION" == *"-"* ]]; then
              echo "TAG=beta" >> $GITHUB_OUTPUT
            else
              echo "TAG=latest" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Publish @tantuui/react to npm
        working-directory: packages/react
        run: npm publish --access public --tag ${{ steps.dist_tag.outputs.TAG }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://npm.pkg.github.com"
          scope: "@tantuui"

      - name: Publish @tantuui/react to GitHub Packages
        working-directory: packages/react
        run: npm publish --access public --tag ${{ steps.dist_tag.outputs.TAG }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
