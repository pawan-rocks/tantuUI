name: Deploy Storybook to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

# ── Non-sensitive config — safe to commit ────────────────────────────────────
env:
  AWS_REGION:                 ap-south-1
  S3_BUCKET:                  tantuui-mumbai
  DEPLOY_PATH:                storybook          # → tantuui.com/storybook
  CLOUDFRONT_DISTRIBUTION_ID: E3T9CTZ972H5Y2

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm install

      - name: Build tokens
        run: npm run build --workspace=packages/tokens

      # Build with /storybook base path so all JS/CSS asset URLs are correct
      - name: Build Storybook
        run: npm run storybook:build --workspace=packages/react
        env:
          STORYBOOK_BASE_PATH: /${{ env.DEPLOY_PATH }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # HTML files — no cache, uploaded to s3://bucket/storybook/
      - name: Sync HTML to S3
        run: |
          aws s3 sync packages/react/storybook-static \
            s3://${{ env.S3_BUCKET }}/${{ env.DEPLOY_PATH }} \
            --region ${{ env.AWS_REGION }} \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html" \
            --delete

      # Assets — long cache (filenames are content-hashed by Vite)
      - name: Sync assets to S3
        run: |
          aws s3 sync packages/react/storybook-static \
            s3://${{ env.S3_BUCKET }}/${{ env.DEPLOY_PATH }} \
            --region ${{ env.AWS_REGION }} \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      # Only invalidate /storybook/* — leaves rest of the site untouched
      - name: Invalidate CloudFront
        if: ${{ env.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/${{ env.DEPLOY_PATH }}/*"

      - name: Print URL
        run: echo "🎉 Deployed → https://tantuui.com/${{ env.DEPLOY_PATH }}"
