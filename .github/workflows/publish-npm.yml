name: Publish @tantuui/tokens to npm

on:
  push:
    tags:
      - "tokens-v*" # e.g. tokens-v0.0.1-beta

jobs:
  publish:
    name: Build & Publish @tantuui/tokens
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run build --workspace=packages/tokens

      - name: Extract version from tag
        id: version
        run: echo "TAG_VERSION=${GITHUB_REF#refs/tags/tokens-v}" >> $GITHUB_OUTPUT

      - name: Set package version
        run: npm version ${{ steps.version.outputs.TAG_VERSION }} --no-git-tag-version --workspace=packages/tokens

      - name: Determine dist-tag
        id: dist_tag
        run: |
          VERSION="${{ steps.version.outputs.TAG_VERSION }}"
          if [[ "$VERSION" == *"-"* ]]; then
            echo "TAG=beta" >> $GITHUB_OUTPUT
          else
            echo "TAG=latest" >> $GITHUB_OUTPUT
          fi

      - name: Publish @tantuui/tokens
        run: npm publish --workspace=packages/tokens --access public --tag ${{ steps.dist_tag.outputs.TAG }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
